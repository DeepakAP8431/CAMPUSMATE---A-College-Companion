{% extends 'faculty_dashboard.html' %}
{% block dashboard_title %}
<h1 class="mb-4">Admin Dashboard</h1>
{% endblock %}
{% block admin_features %}
<div class="accordion-item">
    <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseAdmin">
            <i class="fas fa-users-cog me-2"></i> Admin Controls
        </button>
    </h2>
    <div id="collapseAdmin" class="accordion-collapse collapse" data-bs-parent="#uploadAccordion">
        <div class="accordion-body">
            <p>As an admin, you have additional privileges.</p>
            <a href="{{ url_for('manage_users') }}" class="btn btn-danger">
                <i class="fas fa-user-edit"></i> Manage Users (Faculty/Admin)
            </a>
        </div>
    </div>
</div>
{% endblock %}
